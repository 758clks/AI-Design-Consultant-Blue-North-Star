<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f4f2" />

    <style>
      html[data-app-ready="true"] #plainFallback {
        display: none;
      }

      .fileFallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 12px;
        padding: 24px;
        background: #f4f4f2;
        color: #111214;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        text-align: center;
      }

      .fileFallback a {
        color: #1f7a62;
        font-weight: 700;
      }

      .fileFallback h1 {
        margin: 0 0 12px;
        color: #111214;
        -webkit-text-stroke: 0;
        text-stroke: 0;
        font-size: clamp(28px, 8vw, 56px);
        line-height: 1.1;
      }

      .fileFallback p {
        margin: 0 0 10px;
        color: #686b70;
        line-height: 1.7;

      <link rel="stylesheet" href="./assets/index.css" />

      </div>
    </main>
    <div id="root">
      <main class="fileFallback">
        <div>
